version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rksi_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      FLASK_DEBUG: "0"
      TRUST_PROXY: "1"
      ENABLE_BACKGROUND_PARSER: "0"
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/login', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
