{% extends "base.html" %}
{% block content %}
<div class="auth-shell" style="display:flex; flex-direction:column; align-items:center; width:100%; max-width:860px; margin:0 auto;">
  <section class="card narrow" style="width:min(100%, 420px);">
    <h2>Вход</h2>
    <form method="post" class="grid-form">
      <input type="hidden" name="action" value="login" />
      <label>Логин
        <input type="text" name="username" required />
      </label>
      <label>Пароль
        <input type="password" name="password" required />
      </label>
      <button type="submit">Войти</button>
    </form>
  </section>

  <section class="card narrow" style="width:min(100%, 420px);">
    <h2>Регистрация</h2>
    <form method="post" class="grid-form">
      <input type="hidden" name="action" value="register" />
      <label>Логин
        <input type="text" name="username" minlength="3" required />
      </label>
      <label>ФИО (необязательно)
        <input type="text" name="full_name" />
      </label>
      <label>Пароль
        <input type="password" name="password" minlength="6" required />
      </label>
      <label>Повторите пароль
        <input type="password" name="password_confirm" minlength="6" required />
      </label>
      <button type="submit">Зарегистрироваться</button>
    </form>
  </section>
</div>
{% endblock %}
